<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | SafePaw</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    :root {
      --warm-cream: #FFF9F5;    /* 奶油黄背景 */
      --amber-gold: #E9C46A;    /* 琥珀金按钮 */
      --sunset-coral: #E76F51;  /* 夕阳红 */
      --text-dark: #444;        /* 深色文字 */
    }

    body { 
      background-color: var(--warm-cream); 
      margin: 0; 
      font-family: sans-serif; 
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* 统一导航栏样式 */
    header { background: #fff; border-bottom: 1px solid #eee; padding: 10px 0; }
    nav { max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; }
    .logo { font-size: 1.4rem; font-weight: 900; color: #333; text-decoration: none; }
    .nav-links { display: flex; gap: 20px; }
    .nav-links a { text-decoration: none; color: #555; font-weight: 600; font-size: 0.95rem; }
    .btn-donate-nav { background: var(--sunset-coral); color: white !important; padding: 8px 20px; border-radius: 50px; text-decoration: none; font-weight: 800; }

    /* 登录容器 - 暖色调卡片 */
    .auth-page {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      background: radial-gradient(circle at center, #ffffff, #fff4e6); /* 柔和的中心光晕 */
    }

    .auth-card {
      background: #fff;
      padding: 50px 40px;
      border-radius: 40px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 20px 50px rgba(233, 196, 106, 0.15); /* 琥珀色淡阴影 */
      border: 1px solid #ffe8d6;
      text-align: center;
    }

    .auth-card h1 { color: var(--text-dark); margin-bottom: 10px; font-size: 2.2rem; }
    .auth-card p { color: #888; margin-bottom: 30px; }

    .auth-form input {
      width: 100%;
      padding: 15px;
      margin-bottom: 20px;
      border-radius: 12px;
      border: 2px solid #f0f0f0;
      background: #fafafa;
      color: #333;
      box-sizing: border-box;
      outline: none;
      transition: 0.3s;
    }

    .auth-form input:focus { 
      border-color: var(--amber-gold); 
      background: #fff;
    }

    .btn-primary {
      width: 100%;
      padding: 15px;
      background: var(--amber-gold); /* 琥珀金按钮 */
      color: #fff;
      border: none;
      border-radius: 12px;
      font-weight: 800;
      font-size: 1.1rem;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn-primary:hover { 
      background: #dfb650; 
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(233, 196, 106, 0.3);
    }

    .auth-footer { margin-top: 25px; color: #999; font-size: 0.95rem; }
    .auth-footer a { color: var(--sunset-coral); text-decoration: none; font-weight: 700; }
  </style>
</head>
<body>

<header>
  <nav>
    <a href="index.html" class="logo">🐾 SafePaw</a>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="story.html">Story</a>
      <a href="feed.html">Feed</a>
      <a href="adopt.html">Adopt</a>
      <a href="about.html">About</a>
    </div>
    <a href="#" class="btn-donate-nav">Donate</a>
  </nav>
</header>

<main class="auth-page">
  <div class="auth-card">
    <div style="font-size: 3rem; margin-bottom: 10px;">👋</div>
    <h1>Welcome Back</h1>
    <p>Good to see you again!</p>
    <form class="auth-form">
      <input type="email" placeholder="Email Address" required>
      <input type="password" placeholder="Password" required>
      <button type="submit" class="btn-primary">Login Now</button>
    </form>
    <div class="auth-footer">
      New to SafePaw? <a href="register.html">Create Account</a>
    </div>
  </div>
</main>

</body>
</html>
