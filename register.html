<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register | SafePaw</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    :root {
      --warm-cream: #FFF9F5;
      --amber-gold: #E9C46A;
      --sunset-coral: #E76F51;
      --text-dark: #444;
    }

    body { 
      background-color: var(--warm-cream); 
      margin: 0; 
      font-family: sans-serif; 
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header { background: #fff; border-bottom: 1px solid #eee; padding: 10px 0; }
    nav { max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; }
    .logo { font-size: 1.4rem; font-weight: 900; color: #333; text-decoration: none; }
    .nav-links { display: flex; gap: 20px; }
    .nav-links a { text-decoration: none; color: #555; font-weight: 600; font-size: 0.95rem; }
    .btn-donate-nav { background: var(--sunset-coral); color: white !important; padding: 8px 20px; border-radius: 50px; text-decoration: none; font-weight: 800; }

    .auth-page {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      background: radial-gradient(circle at center, #ffffff, #fff4e6);
    }

    .auth-card {
      background: #fff;
      padding: 50px 40px;
      border-radius: 40px;
      width: 100%;
      max-width: 450px;
      box-shadow: 0 20px 50px rgba(233, 196, 106, 0.15);
      border: 1px solid #ffe8d6;
      text-align: center;
    }

    .auth-card h1 { color: var(--text-dark); margin-bottom: 10px; font-size: 2.2rem; }
    .auth-card p { color: #888; margin-bottom: 30px; }

    .auth-form input {
      width: 100%;
      padding: 15px;
      margin-bottom: 15px;
      border-radius: 12px;
      border: 2px solid #f0f0f0;
      background: #fafafa;
      color: #333;
      box-sizing: border-box;
      outline: none;
      transition: 0.3s;
    }

    .auth-form input:focus { 
      border-color: var(--amber-gold); 
      background: #fff;
    }

    .btn-primary {
      width: 100%;
      padding: 15px;
      background: var(--amber-gold);
      color: #fff;
      border: none;
      border-radius: 12px;
      font-weight: 800;
      font-size: 1.1rem;
      cursor: pointer;
      transition: 0.3s;
      margin-top: 10px;
    }

    .btn-primary:hover { 
      background: #dfb650;
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(233, 196, 106, 0.3);
    }

    .auth-footer { margin-top: 25px; color: #999; font-size: 0.95rem; }
    .auth-footer a { color: var(--sunset-coral); text-decoration: none; font-weight: 700; }
  </style>

  
</head>

<script>
    // 使用 DOMContentLoaded 确保 HTML 加载完后再运行脚本
    document.addEventListener('DOMContentLoaded', function() {
        const regForm = document.querySelector('.auth-form');
        
        if (regForm) {
            regForm.addEventListener('submit', function(e) {
                e.preventDefault();

                const email = this.querySelector('input[type="email"]').value;
                const password = this.querySelectorAll('input[type="password"]')[0].value;
                const confirmPass = this.querySelectorAll('input[type="password"]')[1].value;

                if (password !== confirmPass) {
                    alert("Passwords do not match!");
                    return;
                }

                // 注册逻辑：存入数据
                localStorage.setItem(email, password);
                alert("Account created successfully!");
                window.location.href = "login.html"; 
            });
        }
    });
</script>


<body>

<header>
  <nav>
    <a href="index.html" class="logo">🐾 SafePaw</a>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="story.html">Story</a>
      <a href="feed.html">Feed</a>
      <a href="adopt.html">Adopt</a>
      <a href="about.html">About</a>
    </div>
    <a href="#" class="btn-donate-nav">Donate</a>
  </nav>
</header>

<main class="auth-page">
  <div class="auth-card">
    <div style="font-size: 3rem; margin-bottom: 10px;">✨</div>
    <h1>Join SafePaw</h1>
    <p>Start your rescue journey today</p>
    <form class="auth-form">
      <input type="text" placeholder="Full Name" required>
      <input type="email" placeholder="Email Address" required>
      <input type="password" placeholder="Create Password" required>
      <input type="password" placeholder="Confirm Password" required>
      <button type="submit" class="btn-primary">Create My Account</button>
    </form>
    <div class="auth-footer">
      Already have an account? <a href="login.html">Login</a>
    </div>
  </div>
</main>

</body>
</html>
